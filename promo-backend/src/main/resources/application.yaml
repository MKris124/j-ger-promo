spring:
  application:
    name: jager-promo-backend
  profiles:
    active: dev

---
# ===========================
# DEV — H2
# ===========================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:file:./data/jager_db;
    driver-class-name: org.h2.Driver
    username: admin
    password: admin

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  base-url: http://localhost:4200
  jwt:
    secret: dev-secret-key-min-32-characters-long
    expiration: 86400000

---
# ===========================
# PROD — PostgreSQL (Docker)
# ===========================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://postgres:5432/jagerpromo
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: false

app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000